<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1b2e">
<title>🌟 NikoLearn — ისწავლე თამაშით</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1b2e;--card:#252640;--card2:#2d2e4a;--brd:#3a3b5c;
  --text:#e8e6f0;--muted:#8888aa;--dim:#666680;
  --gold:#ffd700;--green:#4caf50;--red:#ef5350;--blue:#42a5f5;
  --purple:#ab47bc;--pink:#ec407a;--orange:#ffa726;--teal:#26a69a;
  --r:16px
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:18px;-webkit-tap-highlight-color:transparent}
.app{max-width:500px;margin:0 auto;padding:1rem;min-height:100vh;display:flex;flex-direction:column}

/* ═══ PROFILES ═══ */
.profiles{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;gap:1.5rem}
.profiles h1{font-size:2.2rem;text-align:center;line-height:1.3}
.profiles h1 .star{animation:spin 3s linear infinite;display:inline-block}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.profiles h1 span{display:block;font-size:.95rem;color:var(--muted);font-weight:300;margin-top:.4rem}
.profile-cards{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center}
.profile-card{background:var(--card);border:2px solid var(--brd);border-radius:20px;padding:1.5rem 2rem;text-align:center;cursor:pointer;transition:all .3s;min-width:150px}
.profile-card:hover,.profile-card:active{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 25px rgba(255,215,0,.15)}
.profile-card .avatar img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)}
.profile-card .avatar{font-size:3rem;margin-bottom:.6rem}
.profile-card .name{font-size:1.3rem;font-weight:700;margin-bottom:.2rem}
.profile-card .age{color:var(--muted);font-size:.9rem}
.profile-card .stats{margin-top:.6rem;font-size:.8rem;color:var(--gold)}
.profile-card .level-badge{display:inline-block;padding:.2rem .7rem;border-radius:20px;font-size:.75rem;font-weight:600;margin-top:.4rem;background:rgba(255,215,0,.15);color:var(--gold)}

/* ═══ HEADER ═══ */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;margin-bottom:.8rem}
.hdr-left{display:flex;align-items:center;gap:.6rem}
.hdr .back{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;padding:.5rem;min-width:44px;min-height:44px}
.hdr .user{font-size:1rem;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:.8rem}
.hdr .score{font-size:1rem;color:var(--gold);font-weight:700}
.hdr .streak{font-size:.85rem;color:var(--orange)}

/* ═══ SHIELDS (ამონაშვილი + Cambridge) ═══ */
.shields{display:flex;gap:.3rem;margin:.5rem 0}
.shield{width:28px;height:28px;border-radius:50%;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .3s}
.shield.earned{border-color:var(--gold);background:rgba(255,215,0,.2)}

/* ═══ MENU ═══ */
.menu{display:flex;flex-direction:column;gap:.8rem;flex:1}
.menu-card{background:var(--card);border:2px solid var(--brd);border-radius:var(--r);padding:1.3rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:1rem;touch-action:manipulation;user-select:none}
.menu-card:hover,.menu-card:active{transform:translateY(-2px);border-color:var(--blue)}
.menu-card .icon{font-size:2.2rem;min-width:50px;text-align:center}
.menu-card .info h3{font-size:1rem;margin-bottom:.2rem}
.menu-card .info p{color:var(--muted);font-size:.82rem}
.menu-card.locked{opacity:.35;pointer-events:none}

/* ═══ SUBJECTS ═══ */
.subjects{display:flex;flex-direction:column;gap:1.2rem;flex:1;justify-content:center;padding:1rem 0}
.subj-card{border:3px solid var(--brd);border-radius:24px;padding:2.2rem 1.5rem;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.subj-card:active{transform:scale(.97)}
.subj-card .subj-icon{font-size:3.5rem;margin-bottom:.6rem}
.subj-card .subj-name{font-size:1.5rem;font-weight:800;margin-bottom:.3rem}
.subj-card .subj-desc{color:var(--muted);font-size:.85rem}
.subj-card .subj-badge{position:absolute;top:.8rem;right:.8rem;font-size:.75rem;padding:.2rem .6rem;border-radius:12px;font-weight:600}
.subj-card.english{border-color:rgba(66,165,245,.4);background:linear-gradient(145deg,var(--card) 60%,rgba(66,165,245,.12))}
.subj-card.english:active{border-color:var(--blue);box-shadow:0 8px 30px rgba(66,165,245,.2)}
.subj-card.english .subj-badge{background:rgba(66,165,245,.15);color:var(--blue)}
.subj-card.math{border-color:rgba(171,71,188,.4);background:linear-gradient(145deg,var(--card) 60%,rgba(171,71,188,.12))}
.subj-card.math:active{border-color:var(--purple);box-shadow:0 8px 30px rgba(171,71,188,.2)}
.subj-card.math .subj-badge{background:rgba(171,71,188,.15);color:var(--purple)}

/* ═══ MODE GRID ═══ */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;padding:.5rem 0}
.mode-card{background:var(--card);border:2px solid var(--brd);border-radius:18px;padding:1.4rem .8rem;text-align:center;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:.5rem;touch-action:manipulation;user-select:none}
.mode-card:active{transform:scale(.96);border-color:var(--gold)}
.mode-card .m-icon{font-size:2.4rem}
.mode-card .m-name{font-size:.95rem;font-weight:700}
.mode-card .m-desc{color:var(--muted);font-size:.72rem}
.mode-card.wide{grid-column:span 2}

/* ═══ GAME ═══ */
.game{flex:1;display:flex;flex-direction:column;gap:.8rem}
.progress-bar{height:10px;background:var(--card);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s;border-radius:5px}
.q-info{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted)}

/* Word Display */
.word-box{text-align:center;padding:1.5rem;background:var(--card);border-radius:var(--r);margin:.5rem 0;cursor:pointer;transition:transform .2s}
.word-box:active{transform:scale(.98)}
.word-box .emoji{font-size:3.5rem;margin-bottom:.5rem}
.word-box .word{font-size:2rem;font-weight:700;margin-bottom:.3rem}
.word-box .sub{color:var(--muted);font-size:.95rem}
.word-box .speak-hint{color:var(--blue);font-size:.8rem;margin-top:.4rem}

/* Options */
.options{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.5rem 0}
.opt{background:var(--card);border:2px solid var(--brd);border-radius:14px;padding:1.3rem .8rem;text-align:center;font-size:1.2rem;font-weight:600;cursor:pointer;transition:all .25s ease;font-family:inherit;color:var(--text);min-height:70px;display:flex;align-items:center;justify-content:center;gap:.4rem;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:rgba(255,215,0,.2)}
.opt:active{transform:scale(.95)}
.opt.correct{border-color:var(--green);background:rgba(76,175,80,.15);animation:pop .3s}
.opt.wrong{border-color:var(--red);background:rgba(239,83,80,.1);animation:shake .3s}
.opt.disabled{opacity:.4;pointer-events:none}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Feedback overlay */
.feedback{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(26,27,46,.85);z-index:200;animation:fadeIn .2s}
.feedback-box{text-align:center;padding:2rem}
.feedback-box .fb-emoji{font-size:4rem;margin-bottom:.5rem}
.feedback-box .fb-text{font-size:1.5rem;font-weight:700}
.feedback-box .fb-sub{color:var(--muted);font-size:1rem;margin-top:.3rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Spelling */
.spell-input{width:100%;padding:1.3rem;font-size:1.4rem;text-align:center;background:var(--card);border:2px solid var(--brd);border-radius:14px;color:var(--text);font-family:inherit;outline:none;letter-spacing:2px}
.spell-input:focus{border-color:var(--blue)}
.spell-btn{width:100%;padding:1.1rem;background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem;min-height:50px;touch-action:manipulation}

/* Match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.match-card{background:var(--card);border:2px solid var(--brd);border-radius:12px;padding:1.1rem;text-align:center;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .25s;min-height:60px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none}
.match-card.selected{border-color:var(--purple);background:rgba(171,71,188,.15)}
.match-card.matched{border-color:var(--green);background:rgba(76,175,80,.15);opacity:.5;pointer-events:none}
.match-card.wrong{animation:shake .3s}

/* Results */
.results{text-align:center;padding:1.5rem;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.results .big{font-size:4rem}
.results h2{font-size:1.6rem}
.results .stat-row{display:flex;gap:1.5rem}
.results .stat{text-align:center}
.results .stat .val{font-size:1.8rem;font-weight:700}
.results .stat .label{color:var(--muted);font-size:.75rem}
.btn-primary{padding:1rem 2.5rem;background:var(--gold);color:#1a1b2e;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:50px;touch-action:manipulation}
.btn-secondary{padding:.8rem 2rem;background:var(--card);color:var(--text);border:2px solid var(--brd);border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;min-height:50px;touch-action:manipulation}

/* Level progress */
.level-card{background:var(--card);border-radius:var(--r);padding:1rem;margin:.5rem 0}
.level-name{font-size:1.1rem;font-weight:700;margin-bottom:.4rem}
.level-bar{height:10px;background:var(--card2);border-radius:5px;overflow:hidden;margin-bottom:.3rem}
.level-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:5px;transition:width .5s}
.level-info{font-size:.8rem;color:var(--muted)}

/* Break reminder (ამონაშვილი) */
.break-reminder{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,27,46,.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem}
.break-reminder .br-emoji{font-size:5rem}
.break-reminder .br-text{font-size:1.3rem;line-height:1.6}
.break-reminder .br-btn{padding:1rem 2rem;background:var(--teal);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit}

/* Parent */
.parent{padding:.5rem 0}
.parent h2{font-size:1.1rem;margin-bottom:.8rem;color:var(--gold)}

/* ═══ BOTTOM NAV ═══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--brd);display:flex;justify-content:space-around;padding:.5rem 0 calc(.5rem + env(safe-area-inset-bottom));z-index:100}
.bottom-nav button{background:none;border:none;color:var(--muted);font-size:1.6rem;cursor:pointer;padding:.4rem .8rem;border-radius:12px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.15rem;font-family:inherit;min-width:60px}
.bottom-nav button .nav-label{font-size:.6rem;font-weight:600}
.bottom-nav button:active,.bottom-nav button.active{color:var(--gold);background:rgba(255,215,0,.1)}
.has-nav{padding-bottom:5rem}

/* ═══ SUBJECT GRID (2x2) ═══ */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;flex:1;align-content:center;padding:1rem 0}
.subj-grid .subj-card{padding:1.5rem .8rem}

/* Hidden */
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app" id="app">

<!-- PROFILES -->
<div class="profiles" id="screen-profiles">
  <h1><span class="star">🌟</span> NikoLearn<span>ისწავლე თამაშით!</span></h1>
  <div class="profile-cards">
    <div class="profile-card" onclick="selectProfile('niko')">
      <div class="avatar"><img src="kids.jpeg" style="object-position:left center" alt="ნიკო"></div>
      <div class="name">ნიკოლოზი</div>
      <div class="age">7 წლის</div>
      <div class="stats" id="niko-stats"></div>
    </div>
    <div class="profile-card" onclick="selectProfile('masho')">
      <div class="avatar"><img src="kids.jpeg" style="object-position:right center" alt="მაშო"></div>
      <div class="name">მაშო</div>
      <div class="age">5 წლის</div>
      <div class="stats" id="masho-stats"></div>
    </div>
    <div class="profile-card" onclick="selectProfile('guest')">
      <div class="avatar">🎮</div>
      <div class="name">სტუმარი</div>
      <div class="age"></div>
      <div class="stats" id="guest-stats"></div>
    </div>
    <div class="profile-card" onclick="showParent()" style="min-width:110px;padding:1.2rem">
      <div class="avatar">👨‍💼</div>
      <div class="name" style="font-size:1rem">მშობელი</div>
    </div>
  </div>
</div>

<!-- SUBJECTS -->
<div class="hidden" id="screen-subjects">
  <div class="hdr">
    <div class="hdr-left"><button class="back" onclick="goProfiles()">←</button><span class="user" id="subj-user"></span></div>
    <div class="hdr-right"><span class="score" id="subj-score">🛡️ 0</span><span class="streak" id="subj-streak">🔥 0</span></div>
  </div>
  <div id="subj-level"></div>
  <div class="subjects" id="subject-cards"></div>
</div>

<!-- MENU -->
<div class="hidden" id="screen-menu">
  <div class="hdr">
    <div class="hdr-left"><button class="back" onclick="goSubjects()">←</button><span class="user" id="menu-user"></span></div>
    <div class="hdr-right"><span class="score" id="menu-score">🛡️ 0</span><span class="streak" id="menu-streak">🔥 0</span></div>
  </div>
  <div id="menu-level"></div>
  <div class="menu" id="menu-items"></div>
</div>

<!-- GAME -->
<div class="hidden" id="screen-game">
  <div class="hdr">
    <div class="hdr-left"><button class="back" onclick="endGame()">←</button><span class="user" id="game-mode"></span></div>
    <div class="hdr-right"><span class="score" id="game-score">🛡️ 0</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="q-info"><span id="q-num"></span><span id="q-shields"></span></div>
  <div class="game" id="game-area"></div>
</div>

<!-- RESULTS -->
<div class="hidden" id="screen-results">
  <div class="results" id="results-content"></div>
</div>

<!-- PARENT -->
<div class="hidden" id="screen-parent">
  <div class="hdr"><div class="hdr-left"><button class="back" onclick="goProfiles()">←</button><span class="user">👨‍💼 მშობლის პანელი</span></div></div>
  <div class="parent" id="parent-content"></div>
</div>

<!-- CATEGORIES -->
<div class="hidden" id="screen-cats">
  <div class="hdr"><div class="hdr-left"><button class="back" onclick="goMenu()">←</button><span class="user">📚 კატეგორიები</span></div></div>
  <div class="menu" id="cats-list"></div>
</div>

<!-- BREAK REMINDER -->
<div class="hidden break-reminder" id="break-screen">
  <div class="br-emoji">🌈</div>
  <div class="br-text">ყოჩაღ! 15 წუთი ისწავლე!<br>დროა პატარა შესვენება.<br>წამოდექი, გაიჭიმე, დალიე წყალი 💧</div>
  <button class="br-btn" onclick="dismissBreak()">მზად ვარ გასაგრძელებლად! 💪</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav hidden" id="bottom-nav">
  <button onclick="goProfiles()"><span>🏠</span><span class="nav-label">Home</span></button>
  <button onclick="navToSubject('math')"><span>📐</span><span class="nav-label"></span></button>
  <button onclick="navToSubject('lang')"><span>🔤</span><span class="nav-label"></span></button>
</div>

</div>

function genMathQs(type){
  const gi=getMathGrade(type);if(!gi)return[];
  const qs=[],n=type==='math-pat'?8:10;
  for(let i=0;i<n;i++){
    if(type==='math-add'){
      const mx=gi.max,ops=gi.ops||1;
      if(ops>=2){
        const a=randInt(1,Math.floor(mx*0.4)),b=randInt(1,Math.floor(mx*0.3)),c=randInt(1,Math.max(1,mx-a-b));
        if(Math.random()>0.5){qs.push({q:`${a} + ${b} + ${c} = ?`,ans:a+b+c,emoji:'➕'});}
        else{const s=a+b;qs.push({q:`${s} + ${c} − ${Math.min(b,s+c-1)} = ?`,ans:s+c-Math.min(b,s+c-1),emoji:'➕➖'});}
      }else{
        const a=randInt(1,Math.floor(mx*0.7)),b=randInt(1,Math.max(1,mx-a));
        qs.push({q:`${a} + ${b} = ?`,ans:a+b,emoji:'➕'});
      }
    }else if(type==='math-sub'){
      const mx=gi.max,ops=gi.ops||1;
      if(ops>=2){
        const a=randInt(Math.floor(mx*0.5),mx),b=randInt(1,Math.floor(a*0.4)),c=randInt(1,Math.floor(a*0.3));
        if(Math.random()>0.5){qs.push({q:`${a} − ${b} − ${c} = ?`,ans:a-b-c,emoji:'➖'});}
        else{qs.push({q:`${a} − ${b} + ${c} = ?`,ans:a-b+c,emoji:'➖➕'});}
      }else{
        const a=randInt(2,mx),b=randInt(1,a-1);
        qs.push({q:`${a} − ${b} = ?`,ans:a-b,emoji:'➖'});
      }
    }else if(type==='math-mul'){
      const t=gi.tables[randInt(0,gi.tables.length-1)],b=randInt(1,10);
      qs.push({q:`${t} × ${b} = ?`,ans:t*b,emoji:'✖️'});
    }else if(type==='math-pat'){
      qs.push(genPattern(gi.hard));
    }
  }
  return qs;
}

function genPattern(hard){
  const type=hard?randInt(0,3):randInt(0,1);
  let seq=[],ans,step;
  if(type===0){step=randInt(1,hard?5:2);const s=randInt(1,hard?10:3);seq=[s];for(let i=1;i<4;i++)seq.push(seq[i-1]+step);ans=seq[3]+step;}
  else if(type===1){step=randInt(1,hard?4:2);const s=randInt(hard?20:12,hard?30:15);seq=[s];for(let i=1;i<4;i++)seq.push(seq[i-1]-step);ans=seq[3]-step;}
  else if(type===2){const s=randInt(1,4);seq=[s];for(let i=1;i<4;i++)seq.push(seq[i-1]*2);ans=seq[3]*2;}
  else{const s=randInt(1,5);seq=[s];let inc=1;for(let i=1;i<4;i++){seq.push(seq[i-1]+inc);inc++;}ans=seq[3]+inc;}
  return{q:seq.join(', ')+', ?',ans,emoji:'🧩'};
}

function genMathOpts(ans){
  const opts=new Set([ans]);const range=Math.max(3,Math.ceil(Math.abs(ans)*0.3)+1);
  while(opts.size<4){const off=randInt(1,range)*(Math.random()>0.5?1:-1);const v=ans+off;if(v>=0&&!opts.has(v))opts.add(v);}
  if(opts.size<4){let x=ans+1;while(opts.size<4){if(!opts.has(x))opts.add(x);x++;}}
  return shuffle([...opts]);
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.85;u.pitch=1.6;u.volume=1;
  const voices=window.speechSynthesis.getVoices();
  // ენერგიული, ბავშვისთვის მოტივირებელი ხმა
  const pref=['Google US English','Microsoft Aria','Microsoft Jenny','Samantha','Daniel','Alex','Fiona','Rishi'];
  let v=null;
  for(const n of pref){v=voices.find(x=>x.name.includes(n)&&x.lang.startsWith('en'));if(v)break;}
  if(!v)v=voices.find(x=>x.name.includes('Male')&&x.lang.startsWith('en'));
  if(!v)v=voices.find(x=>x.lang.startsWith('en-US'));
  if(!v)v=voices.find(x=>x.lang.startsWith('en'));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

// ═══ WORDS ═══
function getWords(){
  let pool=[];
  (activeCat?[activeCat]:AGE_CATS[profile]).forEach(c=>pool.push(...WORDS[c]));
  const ws=state[profile].words;
  // Weak words first (ამონაშვილი: productive struggle — retry what's hard)
  pool.sort((a,b)=>{
    const sa=ws[a.en]?ws[a.en].correct/(ws[a.en].correct+ws[a.en].wrong+1):0;
    const sb=ws[b.en]?ws[b.en].correct/(ws[b.en].correct+ws[b.en].wrong+1):0;
    return sa-sb;
  });
  return pool;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ═══ START GAME ═══
function startGame(mode){
  gameMode=mode;
  const pool=getWords();
  questions=shuffle([...pool]).slice(0,10);
  if(questions.length<4)questions=shuffle([...pool]);
  qIdx=0;sessionShields=0;sessionWrong=0;sessionPoints=0;
  show('game');
  const names={quiz:'🎯 მოისმინე',reverse:'🔄 Eng→ქართ',spell:'✍️ დაწერე',match:'🧩 დააწყვილე',listen:'👂 სურათი'};
  document.getElementById('game-mode').textContent=names[mode]||mode;
  document.getElementById('game-score').textContent='🛡️ 0';
  if(mode==='match')startMatch();
  else if(mode==='listen')nextListen();
  else nextQ();
}

// ═══ QUIZ / REVERSE ═══
function nextQ(){
  if(qIdx>=questions.length){showResults();return;}
  const q=questions[qIdx];
  document.getElementById('progress').style.width=((qIdx/questions.length)*100)+'%';
  document.getElementById('q-num').textContent=`${qIdx+1}/${questions.length}`;
  document.getElementById('q-shields').textContent=`🛡️ ${sessionShields}`;
  const area=document.getElementById('game-area');
  const pool=getWords();
  let opts=[q];while(opts.length<4){const r=pool[Math.floor(Math.random()*pool.length)];if(!opts.find(o=>o.en===r.en))opts.push(r);}
  shuffle(opts);

  if(gameMode==='quiz'){
    area.innerHTML=`<div class="word-box" onclick="speak('${q.en}')"><div class="emoji">${q.emoji}</div><div class="word">${q.ka}</div><div class="speak-hint">🔊 დააჭირე მოსასმენად</div></div>
    <div class="options">${opts.map(o=>`<button class="opt" onclick="speak('${o.en}');checkAnswer(this,'${o.en}','${q.en}')">🔊 ${o.en}</button>`).join('')}</div>`;
  } else if(gameMode==='reverse'){
    speak(q.en);
    area.innerHTML=`<div class="word-box" onclick="speak('${q.en}')"><div class="emoji">🔊</div><div class="word">${q.en}</div><div class="speak-hint">🔊 მოისმინე</div></div>
    <div class="options">${opts.map(o=>`<button class="opt" onclick="checkAnswer(this,'${o.en}','${q.en}')">${o.ka}</button>`).join('')}</div>`;
  } else if(gameMode==='spell'){
    area.innerHTML=`<div class="word-box" onclick="speak('${q.en}')"><div class="emoji">${q.emoji}</div><div class="word">${q.ka}</div><div class="speak-hint">🔊 მოისმინე და დაწერე ინგლისურად</div></div>
    <input class="spell-input" id="sp-in" type="text" autocomplete="off" autocapitalize="off" placeholder="type here...">
    <button class="spell-btn" onclick="checkSpell('${q.en}')">შეამოწმე ✓</button>`;
    setTimeout(()=>{const inp=document.getElementById('sp-in');if(inp){inp.focus();inp.onkeypress=e=>{if(e.key==='Enter')checkSpell(q.en);};}},200);
  }

}

// ═══ MATCH ═══
let matchPairs,matchSel,matchDone;
function startMatch(){
  const pool=shuffle(getWords()).slice(0,6);matchPairs=pool;matchSel=null;matchDone=0;
  const cards=[];pool.forEach(w=>{cards.push({text:w.ka,lang:'ka',word:w});cards.push({text:w.en,lang:'en',word:w});});
  shuffle(cards);
  document.getElementById('progress').style.width='0%';
  document.getElementById('q-num').textContent=`0/${pool.length}`;
  document.getElementById('q-shields').textContent='🛡️ 0';
  document.getElementById('game-area').innerHTML=`<div class="match-grid">${cards.map((c,i)=>
    `<div class="match-card" data-w="${c.word.en}" data-l="${c.lang}" onclick="matchClick(this)">${c.text}</div>`).join('')}</div>`;
}
function matchClick(el){
  if(el.classList.contains('matched'))return;
  if(el.dataset.l==='en')speak(el.dataset.w);
  el.classList.add('selected');
  if(!matchSel){matchSel=el;return;}
  const a=matchSel,b=el;
  if(a===b){b.classList.remove('selected');matchSel=null;return;}
  if(a.dataset.w===b.dataset.w&&a.dataset.l!==b.dataset.l){
    a.classList.remove('selected');b.classList.remove('selected');a.classList.add('matched');b.classList.add('matched');
    matchDone++;record(a.dataset.w,true);
    document.getElementById('progress').style.width=((matchDone/matchPairs.length)*100)+'%';
    document.getElementById('q-num').textContent=`${matchDone}/${matchPairs.length}`;
    if(matchDone===matchPairs.length)setTimeout(showResults,500);
  } else {
    a.classList.add('wrong');b.classList.add('wrong');record(a.dataset.w,false);
    setTimeout(()=>{a.classList.remove('selected','wrong');b.classList.remove('selected','wrong');},400);
  }
  matchSel=null;
}

// ═══ SCORING (Shields instead of points — Cambridge YLE) ═══
function record(word,correct){
  const s=state[profile];
  if(!s.words[word])s.words[word]={correct:0,wrong:0,lastSeen:null};
  s.words[word].lastSeen=new Date().toISOString();
  if(correct){
    s.words[word].correct++;sessionShields++;
    s.shields++;s.streak++;if(s.streak>s.maxStreak)s.maxStreak=s.streak;
  } else {
    s.words[word].wrong++;sessionWrong++;s.streak=0;
  }
  document.getElementById('game-score').textContent='🛡️ '+sessionShields;
  save();
  // Break reminder after 15 min (ამონაშვილი + SmartyKids: 15min optimal)
  if(sessionStart&&(Date.now()-sessionStart)>15*60*1000){
    document.getElementById('break-screen').classList.remove('hidden');
    sessionStart=Date.now();// reset timer
  }
}

function dismissBreak(){document.getElementById('break-screen').classList.add('hidden');}

function retryWeak(){
  const ws=state[profile].words;
  const weakW=Object.entries(ws).filter(([k,v])=>v.wrong>=v.correct).map(([k])=>k);
  if(weakW.length<2){startGame(gameMode);return;}
  const all=[];Object.values(WORDS).forEach(c=>all.push(...c));
  questions=all.filter(w=>weakW.includes(w.en));
  if(questions.length<4){const extra=shuffle(all.filter(w=>!weakW.includes(w.en))).slice(0,4-questions.length);questions.push(...extra);}
  shuffle(questions);qIdx=0;sessionShields=0;sessionWrong=0;
  show('game');document.getElementById('game-mode').textContent='🔄 გამეორება';document.getElementById('game-score').textContent='🛡️ 0';

function beatYesterdayHTML(mode,current){

  if(best===0)return'';

  if(current===best)return`<div style="font-size:.9rem;color:var(--blue);margin:.5rem 0">🤝 გუშინდელი გაიმეორე: ${current}</div>`;
  return`<div style="font-size:.9rem;color:var(--orange);margin:.5rem 0">💪 გუშინ ${best} გქონდა. ხვალ გაჯობებ!</div>`;
}
function updateBestScore(mode,current){
  if(!state[profile].bestScore)state[profile].bestScore={};
  if(current>(state[profile].bestScore[mode]||0))state[profile].bestScore[mode]=current;
  save();
}

const KINGS_MATH = [
  // Grade 2 level
  {q:'რამდენი ფეხი აქვს 3 კატას ჯამში?',a:12,opts:[12,6,8],emoji:'🐱🐱🐱'},
  {q:'რამდენი ფეხი აქვს 2 ძაღლს ჯამში?',a:8,opts:[8,6,4],emoji:'🐕🐕'},
  {q:'რამდენი გვერდი აქვს ჯამში 1 სამკუთხედს და 1 ოთხკუთხედს?',a:7,opts:[7,10,14],emoji:'🔺🔲'},
  {q:'3 ვაშლი + 4 ვაშლი = ?',a:7,opts:[7,6,8],emoji:'🍎🍎🍎 + 🍎🍎🍎🍎'},
  {q:'10 ფანქარი - 3 ფანქარი = ?',a:7,opts:[7,6,8],emoji:'✏️✏️✏️✏️✏️✏️✏️✏️✏️✏️'},
  {q:'2 ხუთლარიანი საზამთრო ღირს:',a:10,opts:[10,8,15],emoji:'🍉🍉'},
  {q:'5 ბავშვს თითო 2 ტკბილეული აქვს. ჯამში რამდენია?',a:10,opts:[10,7,12],emoji:'🧒🧒🧒🧒🧒'},
  {q:'კიბეს 11 საფეხური აქვს. შუაში რომელია?',a:6,opts:[6,5,7],emoji:'🪜'},
  // Grade 2-3 sequences
  {q:'5, 7, 9, ?, 13 — რა უნდა იყოს ?-ის ნაცვლად?',a:11,opts:[11,15,17],emoji:'🔢'},
  {q:'0, 3, 6, 9, 12, ? — შემდეგი?',a:15,opts:[15,7,19],emoji:'🔢'},
  {q:'19, 15, 11, 7, ? — შემდეგი?',a:3,opts:[3,5,6],emoji:'🔢'},
  // Grade 2-3 "რომელი განსხვავდება"
  {q:'რომელი არ უდრის 11-ს?',a:'3+7',opts:['5+6','13-2','3+7'],emoji:'🤔',type:'text'},
  {q:'რომელი არ უდრის 10-ს?',a:'6+5',opts:['7+3','15-5','6+5'],emoji:'🤔',type:'text'},
];
let kingsQs=[],kingsIdx=0;

function startKingsMath(){
  kingsQs=shuffle([...KINGS_MATH]).slice(0,10);kingsIdx=0;
  sessionShields=0;sessionWrong=0;sessionStart=Date.now();
  show('game');
  document.getElementById('game-mode').textContent='👑 Kings Math';
  document.getElementById('game-score').textContent='🛡️ 0';
  nextKingsQ();
}
function nextKingsQ(){
  if(kingsIdx>=kingsQs.length){showKingsResults();return;}
  const q=kingsQs[kingsIdx];
  document.getElementById('progress').style.width=((kingsIdx/kingsQs.length)*100)+'%';
  document.getElementById('q-num').textContent=`${kingsIdx+1}/${kingsQs.length}`;
  document.getElementById('q-shields').textContent=`🛡️ ${sessionShields}`;
  const opts=shuffle([...q.opts]);
  document.getElementById('game-area').innerHTML=`
    <div class="word-box"><div class="emoji" style="font-size:2rem">${q.emoji||''}</div>
    <div style="font-size:1rem;margin:.5rem 0;line-height:1.5">${q.q}</div></div>
    <div class="options">${opts.map(o=>{
      const isText=q.type==='text';
      const display=isText?o:o;
      return`<button class="opt" style="font-size:${isText?'1rem':'1.8rem'};min-height:75px" onclick="checkKingsAns(this,${isText?`'${o}','${q.a}'`:`${o},${q.a}`})">${display}</button>`;
    }).join('')}</div>`;
}
function checkKingsAns(btn,sel,correct){
  const match=String(sel)===String(correct);
  if(match){
    document.querySelectorAll('.opt').forEach(b=>{b.classList.add('disabled');b.style.pointerEvents='none';});
    btn.classList.add('correct');sessionShields++;state[profile].shields++;state[profile].streak++;
    if(state[profile].streak>state[profile].maxStreak)state[profile].maxStreak=state[profile].streak;
    save();document.getElementById('game-score').textContent='🛡️ '+sessionShields;
    showFeedback(true);setTimeout(()=>{kingsIdx++;hideFeedback();nextKingsQ();},1200);
  }else{
    btn.classList.add('wrong');btn.style.pointerEvents='none';btn.classList.add('disabled');
    sessionWrong++;state[profile].streak=0;save();
  }
}
function showKingsResults(){
  show('results');const total=sessionShields+sessionWrong;const pct=total>0?Math.round(sessionShields/total*100):0;
  let msg=pct>=80?getName()+', Kings Champion! 👑🌟':pct>=50?getName()+', კარგი შედეგი! 💪':getName()+', კიდევ ცადე! 🌱';
  document.getElementById('results-content').innerHTML=`
    <div class="big">${pct>=80?'👑':pct>=50?'⭐':'🌱'}</div><h2>${msg}</h2>
    <div class="stat-row"><div class="stat"><div class="val" style="color:var(--green)">${sessionShields}</div><div class="label">🛡️</div></div>
    <div class="stat"><div class="val">${pct}%</div><div class="label">📊</div></div></div>
    ${beatYesterdayHTML('kings-math',sessionShields)}
    <button class="btn-primary" onclick="startKingsMath()" style="background:var(--gold);color:#1a1b2e">👑 ახალი რაუნდი</button>
    <button class="btn-secondary" onclick="goMenu()">📋</button>
    <button class="btn-primary" onclick="showDad('kings-math',${sessionShields},${pct})" style="background:var(--gold);color:#1a1b2e;margin-top:.5rem">🎉 მამას აჩვენე!</button>`;
  updateBestScore('kings-math',sessionShields);
  state[profile].sessions++;state[profile].lastPlayed=new Date().toISOString();save();
  checkActivityBreak();
}

function endGame(){goMenu();}

// ═══ MATH GAME ═══
function startMathGame(type){
  mathMode=type;mathQs=genMathQs(type);mathIdx=0;
  sessionShields=0;sessionWrong=0;sessionStart=Date.now();
  show('game');
  const names={'math-add':'➕ შეკრება','math-sub':'➖ გამოკლება','math-mul':'✖️ გამრავლება','math-pat':'🧩 პატერნები'};
  document.getElementById('game-mode').textContent=names[type]||type;
  document.getElementById('game-score').textContent='🛡️ 0';
  nextMathQ();
}

function nextMathQ(){
  if(mathIdx>=mathQs.length){showMathResults();return;}
  const q=mathQs[mathIdx];
  document.getElementById('progress').style.width=((mathIdx/mathQs.length)*100)+'%';
  document.getElementById('q-num').textContent=`${mathIdx+1}/${mathQs.length}`;
  document.getElementById('q-shields').textContent=`🛡️ ${sessionShields}`;
  const opts=genMathOpts(q.ans);
  document.getElementById('game-area').innerHTML=`
    <div class="word-box"><div class="emoji" style="font-size:3rem">${q.emoji}</div>
    <div class="word" style="font-size:2.2rem;letter-spacing:3px">${q.q}</div>
    ${mathMode==='math-pat'?'<div class="sub" style="color:var(--purple)">იპოვე კანონზომიერება!</div>':''}</div>
    <div class="options">${opts.map(o=>`<button class="opt" style="font-size:1.8rem" onclick="checkMathAns(this,${o},${q.ans})">${o}</button>`).join('')}</div>`;
}

function checkMathAns(btn,selected,correct){
  if(!state[profile].math)state[profile].math={};
  if(!state[profile].math[mathMode])state[profile].math[mathMode]={correct:0,wrong:0};
  const lvl=getMathLvl(mathMode);const ls=getMathLvlStats(mathMode,lvl);
  if(selected===correct){
    document.querySelectorAll('.opt').forEach(b=>{b.classList.add('disabled');b.style.pointerEvents='none';});
    btn.classList.add('correct');
    sessionShields++;state[profile].shields++;state[profile].streak++;
    if(state[profile].streak>state[profile].maxStreak)state[profile].maxStreak=state[profile].streak;
    state[profile].math[mathMode].correct++;ls.c++;
    save();
    document.getElementById('game-score').textContent='🛡️ '+sessionShields;
    showFeedback(true);
    setTimeout(()=>{mathIdx++;hideFeedback();nextMathQ();},1200);
  } else {
    btn.classList.add('wrong');btn.style.pointerEvents='none';btn.classList.add('disabled');
    sessionWrong++;state[profile].streak=0;
    state[profile].math[mathMode].wrong++;ls.w++;
    save();
    if(sessionStart&&(Date.now()-sessionStart)>15*60*1000){
      document.getElementById('break-screen').classList.remove('hidden');sessionStart=Date.now();
    }
  }
}

function showMathResults(){
  show('results');
  const total=sessionShields+sessionWrong;
  const pct=total>0?Math.round(sessionShields/total*100):0;

  // Level-up check
  const lvl=getMathLvl(mathMode);const ls=getMathLvlStats(mathMode,lvl);
  const lvlAcc=ls.c+ls.w>0?Math.round(ls.c/(ls.c+ls.w)*100):0;
  let leveledUp=false;
  if(ls.c>=LVLUP_NEED && lvlAcc>=LVLUP_ACC && !isMaxMathLvl(mathMode)){
    if(!state[profile].mathLvl)state[profile].mathLvl={};
    state[profile].mathLvl[mathMode]=lvl+1;
    leveledUp=true;
  }

  const gi=getMathGrade(mathMode);
  let msg='';
  if(leveledUp)msg=getName()+', ახალი ლეველი! 🚀 → '+gi.label;
  else if(pct>=90)msg=getName()+', მათემატიკოსი ხარ! 🌟';
  else if(pct>=70)msg=getName()+', კარგად მიდიხარ! 💪';
  else if(pct>=50)msg=getName()+', ისწავლე ახალი! 📚';
  else msg=getName()+', ყოველი ცდა = წინსვლა! 🌱';

  // Progress to next level
  const maxLvl=isMaxMathLvl(mathMode);
  const progPct=maxLvl?100:Math.min(100,Math.round((ls.c/LVLUP_NEED)*100));
  const progAcc=maxLvl?'✅':lvlAcc+'%';

  document.getElementById('results-content').innerHTML=`
    <div class="big">${leveledUp?'🚀':pct>=80?'🏆':pct>=50?'⭐':'🌱'}</div>
    <h2>${msg}</h2>
    <div class="stat-row">
      <div class="stat"><div class="val" style="color:var(--green)">${sessionShields}</div><div class="label">🛡️ shields</div></div>
      <div class="stat"><div class="val">${pct}%</div><div class="label">📊 სიზუსტე</div></div>
      <div class="stat"><div class="val" style="color:var(--orange)">${state[profile].streak}</div><div class="label">🔥 streak</div></div>
    </div>
    <div class="level-card" style="width:100%">
      <div class="level-name" style="color:var(--purple)">📐 ${gi?gi.label:''} ${maxLvl?'— მაქსიმუმი! 🏆':''}</div>
      <div class="level-bar"><div class="level-fill" style="width:${progPct}%;background:linear-gradient(90deg,var(--purple),var(--pink))"></div></div>
      <div class="level-info">${maxLvl?'მაქსიმალური ლეველი!':`${ls.c}/${LVLUP_NEED} სწორი (${progAcc} სიზუსტე) → შემდეგი ლეველი`}</div>
    </div>
    ${beatYesterdayHTML(mathMode,sessionShields)}
    <button class="btn-primary" onclick="startMathGame('${mathMode}')" style="background:var(--purple)">🎮 ახალი რაუნდი</button>
    <button class="btn-secondary" onclick="goMenu()">📋 მენიუ</button>
    <button class="btn-primary" onclick="showDad('${mathMode}',${sessionShields},${pct})" style="background:var(--gold);color:#1a1b2e;margin-top:.5rem">🎉 მამას აჩვენე!</button>
  `;
  updateBestScore(mathMode,sessionShields);
  state[profile].sessions++;state[profile].lastPlayed=new Date().toISOString();
  if(sessionStart)state[profile].totalTime+=(Date.now()-sessionStart);
  save();
}

// ═══ PARENT DASHBOARD ═══
function showParent(){
  show('parent');
  let html='';
  ['niko','masho','guest'].forEach(p=>{
    if(!state[p])return;
    const s=state[p];const name=p==='niko'?'🧒 ნიკოლოზი':p==='masho'?'👧 მაშო':'🎮 სტუმარი';const lvl=getLevel(p);
    const words=Object.entries(s.words);const total=words.length;
    const correct=words.reduce((a,[k,v])=>a+v.correct,0);
    const wrong=words.reduce((a,[k,v])=>a+v.wrong,0);
    const accuracy=correct+wrong>0?Math.round(correct/(correct+wrong)*100):0;
    const weak=words.filter(([k,v])=>v.wrong>v.correct).map(([k])=>k);
    const strong=words.filter(([k,v])=>v.correct>=3&&v.wrong===0).map(([k])=>k);
    const lastPlayed=s.lastPlayed?new Date(s.lastPlayed).toLocaleDateString('ka-GE'):'—';
    const totalMin=Math.round((s.totalTime||0)/60000);

    html+=`<h2>${name} — ${lvl.name}</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.8rem">
      <div style="background:var(--card);border-radius:10px;padding:.7rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--gold)">${s.shields}</div><div style="font-size:.65rem;color:var(--muted)">🛡️ shields</div></div>
      <div style="background:var(--card);border-radius:10px;padding:.7rem;text-align:center"><div style="font-size:1.4rem;font-weight:700">${lvl.learned}</div><div style="font-size:.65rem;color:var(--muted)">📚 ნასწავლი</div></div>
      <div style="background:var(--card);border-radius:10px;padding:.7rem;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:${accuracy>=70?'var(--green)':'var(--orange)'}">${accuracy}%</div><div style="font-size:.65rem;color:var(--muted)">სიზუსტე</div></div>
    </div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:.3rem">🕐 ბოლოს: ${lastPlayed} | 🎮 ${s.sessions} სესია | ⏱️ ${totalMin} წუთი | 🔥 max streak: ${s.maxStreak}</div>
    ${weak.length>0?`<div style="font-size:.82rem;color:var(--orange);margin-bottom:.3rem">⚠️ სუსტი: ${weak.slice(0,8).join(', ')}</div>`:''}
    ${strong.length>0?`<div style="font-size:.82rem;color:var(--green);margin-bottom:.5rem">✅ ძლიერი: ${strong.slice(0,8).join(', ')}</div>`:''}
    ${s.math?`<div style="font-size:.85rem;color:var(--purple);margin:.5rem 0;font-weight:600">📐 მათემატიკა</div>
    <div style="display:grid;grid-template-columns:repeat(${Object.keys(s.math).length},1fr);gap:.4rem;margin-bottom:.5rem">
    ${Object.entries(s.math).map(([k,v])=>{const nm={'math-add':'➕','math-sub':'➖','math-mul':'✖️','math-pat':'🧩'}[k]||k;const acc=v.correct+v.wrong>0?Math.round(v.correct/(v.correct+v.wrong)*100):0;return`<div style="background:var(--card);border-radius:8px;padding:.5rem;text-align:center"><div style="font-size:1.2rem">${nm}</div><div style="font-size:.9rem;font-weight:700;color:${acc>=70?'var(--green)':'var(--orange)'}">${acc}%</div><div style="font-size:.65rem;color:var(--muted)">${v.correct}✓ ${v.wrong}✗</div></div>`;}).join('')}
    </div>`:''}<hr style="border-color:var(--brd);margin-bottom:1rem">`;
  });
  // Dad messages
  const allDadMsgs=[...(state.niko.dadMessages||[]),...(state.masho.dadMessages||[]),...(state.guest.dadMessages||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  if(allDadMsgs.length>0){
    html+=`<h2 style="color:var(--gold)">🎉 მამას აჩვენე!</h2>`;
    allDadMsgs.forEach(m=>{html+=`<div style="background:var(--card);border-radius:10px;padding:.6rem;margin-bottom:.4rem;font-size:.85rem"><span style="color:var(--gold)">${m.date}</span> — ${m.text}</div>`;});
  }
  html+=`<button class="btn-secondary" style="margin-top:1rem" onclick="if(confirm('წაშალო progress?')){localStorage.removeItem('${SK}');state=load();goProfiles();}">🗑️ Reset</button>`;
  document.getElementById('parent-content').innerHTML=html;
}

// ═══ INIT ═══
state=load();goProfiles();
</script>
</body>
</html>
